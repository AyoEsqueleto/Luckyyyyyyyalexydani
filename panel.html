<style>
:root{
  --primary:#1565ff;
  --primary-dark:#0e49c9;
  --accent:#60a5fa;
  --ink:#0f172a;
  --muted:#64748b;
  --bg:#f4f6ff;
  --card:#ffffff;
  --stroke:rgba(15,23,42,0.08);
  --shadow:0 20px 45px rgba(15,23,42,0.12);
  --radius:18px;
  --glow:0 0 0 1px rgba(96,165,250,0.25),0 18px 32px rgba(15,23,42,0.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Space Grotesk","Poppins",sans-serif;
}

img{max-width:100%;height:auto;}
body{overflow-x:hidden;}

a:focus-visible,
button:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible{
  outline:3px solid rgba(21,101,255,0.55);
  outline-offset:2px;
}

body{
  background:
    radial-gradient(circle at 15% 10%,rgba(21,101,255,0.16),transparent 48%),
    radial-gradient(circle at 85% 5%,rgba(96,165,250,0.22),transparent 40%),
    radial-gradient(circle at 50% 90%,rgba(14,73,201,0.18),transparent 35%),
    var(--bg);
  color:var(--ink);
  padding-top:84px;
  min-height:100vh;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--stroke);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 8%;
  z-index:1000;
}

.header-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:44px;
  width:auto;
  display:block;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  text-decoration:none;
  color:#1f2937;
  font-weight:600;
}

.nav-toggle{
  display:none;
  border:none;
  background:var(--primary);
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.theme-toggle{
  width:40px;
  height:40px;
  padding:0;
  border:1px solid rgba(148,163,184,0.4);
  border-radius:50%;
  background:#fff;
  color:#1f2937;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:0.2s ease;
}

.theme-toggle:hover{
  background:#f1f5f9;
}

.theme-toggle svg{
  width:20px;
  height:20px;
  display:block;
}

.hero{
  padding:88px 8% 42px;
  text-align:center;
  color:#fff;
  background:linear-gradient(135deg,#0b1b3a,#1546b3 55%,#1f6bff);
  position:relative;
  overflow:hidden;
}

.hero::after{
  content:"";
  position:absolute;
  inset:auto -20% -40% -20%;
  height:70%;
  background:radial-gradient(circle at 20% 20%,rgba(255,255,255,0.35),transparent 55%);
  opacity:0.6;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(7,12,24,0.15),transparent 45%,rgba(7,12,24,0.4));
}

.hero h1{
  font-size:clamp(32px,4vw,46px);
  margin-bottom:10px;
  position:relative;
  z-index:1;
}

.hero p{
  opacity:0.9;
  position:relative;
  z-index:1;
}

.wrapper{
  padding:36px 8% 70px;
}

.panel{
  max-width:980px;
  margin:0 auto;
  background:var(--card);
  padding:26px;
  border-radius:var(--radius);
  box-shadow:var(--glow);
  border:1px solid var(--stroke);
  position:relative;
  overflow:hidden;
  animation:panelIn 0.5s ease;
}

.panel::after{
  content:"";
  position:absolute;
  inset:-40% 10% auto 10%;
  height:60%;
  background:radial-gradient(circle at top,rgba(21,101,255,0.18),transparent 70%);
  pointer-events:none;
}

.panel > *{
  position:relative;
  z-index:1;
}

@keyframes panelIn{
  from{transform:translateY(12px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.panel-toolbar{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin:18px 0 16px;
}

.panel-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:#eef4ff;
  border:1px solid rgba(59,130,246,0.2);
  font-size:12px;
  color:#1e3a8a;
  font-weight:600;
}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.panel-title h3{
  font-size:22px;
  margin-bottom:6px;
}

.panel-title p{
  color:var(--muted);
  font-size:14px;
}

.panel-status{
  background:#f0f5ff;
  border-radius:14px;
  padding:12px 16px;
  border:1px solid rgba(59,130,246,0.25);
  min-width:220px;
}

.panel-status span{
  display:block;
  font-size:12px;
  color:#64748b;
}

.panel-status strong{
  font-size:18px;
  color:#0f172a;
}

.panel-status small{
  display:block;
  margin-top:4px;
  font-size:12px;
  color:#475569;
}

.panel-status.is-bad{
  background:#fff1f2;
  border-color:rgba(248,113,113,0.4);
}

.panel-status.is-bad strong{
  color:#dc2626;
}

.panel-status.is-bad span{
  color:#b91c1c;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px;
  margin-bottom:18px;
}

.stat-card{
  background:linear-gradient(140deg,rgba(21,101,255,0.12),rgba(96,165,250,0.08));
  border-radius:16px;
  padding:14px 16px;
  border:1px solid rgba(59,130,246,0.2);
  box-shadow:0 12px 26px rgba(15,23,42,0.08);
  display:grid;
  gap:6px;
}

.stat-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.stat-label{
  font-size:12px;
  color:#475569;
}

.stat-badge{
  padding:4px 8px;
  border-radius:999px;
  background:rgba(21,101,255,0.15);
  color:#1e3a8a;
  font-size:11px;
  font-weight:600;
}

.stat-badge.is-bad{
  background:rgba(248,113,113,0.2);
  color:#b91c1c;
}

.stat-value{
  font-size:18px;
  font-weight:700;
  color:#0f172a;
}

.stat-note{
  font-size:12px;
  color:#64748b;
}

.details{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.detail{
  background:#f8fbff;
  border-radius:14px;
  padding:14px 16px;
  border:1px solid rgba(148,163,184,0.18);
  box-shadow:0 12px 24px rgba(15,23,42,0.06);
}

.detail span{
  display:block;
  font-size:12px;
  color:#64748b;
}

.detail strong{
  font-size:15px;
  color:#0f172a;
}

.status-bad{
  color:#dc2626;
  font-weight:700;
}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.actions button,
.actions a{
  text-decoration:none;
  font-weight:600;
  border-radius:999px;
  padding:10px 16px;
  border:none;
  cursor:pointer;
}

.actions .primary{
  background:var(--primary);
  color:#fff;
  box-shadow:0 12px 24px rgba(21,101,255,0.22);
}

.actions .secondary{
  background:#e8f0ff;
  color:#1e3a8a;
  border:1px solid rgba(59,130,246,0.2);
}

.actions .secondary:hover{
  background:#dfe9ff;
}

.empty{
  text-align:center;
  color:var(--muted);
}

footer{
  background:linear-gradient(135deg,#0f3aa8,#1565ff 55%,#1f6bff);
  color:white;
  text-align:center;

.footer-preferences{

.footer-legal{

<script>
const themeToggle=document.getElementById("themeToggle")
const mainNav=document.getElementById("mainNav")
const navToggle=document.getElementById("navToggle")
const sunIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="5"></line><line x1="12" y1="19" x2="12" y2="22"></line><line x1="2" y1="12" x2="5" y2="12"></line><line x1="19" y1="12" x2="22" y2="12"></line><line x1="4.9" y1="4.9" x2="7" y2="7"></line><line x1="17" y1="17" x2="19.1" y2="19.1"></line><line x1="17" y1="7" x2="19.1" y2="4.9"></line><line x1="4.9" y1="19.1" x2="7" y2="17"></line></svg>'
const moonIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 1 0 9.8 9.8z"></path></svg>'

function updateThemeLabel(){
const isDarkMode=document.body.classList.contains("dark-mode")
if(themeToggle){
themeToggle.innerHTML=isDarkMode?moonIcon:sunIcon
themeToggle.setAttribute("aria-label",isDarkMode?"Modo oscuro":"Modo claro")
themeToggle.setAttribute("title",isDarkMode?"Modo oscuro":"Modo claro")
}
}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark-mode")
}
updateThemeLabel()

if(themeToggle){
themeToggle.addEventListener("click",()=>{
document.body.classList.toggle("dark-mode")
const currentTheme=document.body.classList.contains("dark-mode")?"dark":"light"
localStorage.setItem("theme",currentTheme)
updateThemeLabel()
})
}

if(navToggle && mainNav){
  navToggle.addEventListener("click",()=>{
    const isOpen=mainNav.classList.toggle("is-open")
    navToggle.setAttribute("aria-label",isOpen?"Cerrar menú":"Abrir menú")
    navToggle.textContent=isOpen?"Cerrar":"Menú"
  })

  mainNav.querySelectorAll("a").forEach((link)=>{
    link.addEventListener("click",()=>{
      if(window.innerWidth<=768){
        mainNav.classList.remove("is-open")
        navToggle.setAttribute("aria-label","Abrir menú")
        navToggle.textContent="Menú"
      }
    })
  })
}

function formatEuro(value){
  const raw = String(value || '').replace('€','').trim()
  if(!raw) return '-'
  if(/[a-zA-Z]/.test(raw)) return value
  let num = null
  if(/^[0-9]+([.,][0-9]+)?$/.test(raw)){
    if(raw.includes('.') && raw.includes(',')){
      num = Number(raw.replace(/\./g,'').replace(',','.'))
    }else if(raw.includes(',')){
      num = Number(raw.replace(',','.'))
    }else{
      num = Number(raw)
    }
  }
  if(num === null || !Number.isFinite(num)) return value
  return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(num)
}

const URL_API = "https://script.google.com/macros/s/AKfycbxZeMApnIjxoF4aAPxNhcLbUb09JluFb4E7jP67bINuODTv08q9xDFtzC5updMnV_Gi/exec"
const panel = document.getElementById("panelContent")
const SESSION_DURATION_MS = 8 * 60 * 60 * 1000
const SESSION_VALIDATE_INTERVAL_MS = 60 * 1000
let lastRaw = null
let hasExpiredSession = false
let validationInFlight = false
let lastValidationAt = 0

function jsonpRequest(params, timeoutMs=10000){
  return new Promise((resolve, reject)=>{
    const callbackName = "jsonpCallback_" + Date.now() + "_" + Math.floor(Math.random() * 100000)
    const script = document.createElement("script")
    let isSettled = false

    const cleanup = ()=>{
      if(script.parentNode){
        script.parentNode.removeChild(script)
      }
      try{
        delete window[callbackName]
      }catch(error){
        window[callbackName] = undefined
      }
    }

    const timeoutId = setTimeout(()=>{
      if(isSettled) return
      isSettled = true
      cleanup()
      reject(new Error("TIMEOUT"))
    }, timeoutMs)

    window[callbackName] = (response)=>{
      if(isSettled) return
      isSettled = true
      clearTimeout(timeoutId)
      cleanup()
      resolve(response)
    }

    const query = new URLSearchParams({
      ...params,
      callback: callbackName
    })
    script.src = `${URL_API}?${query.toString()}`
    script.async = true
    script.onerror = ()=>{
      if(isSettled) return
      isSettled = true
      clearTimeout(timeoutId)
      cleanup()
      reject(new Error("NETWORK"))
    }
    document.body.appendChild(script)
  })
}

function parseSessionExpiry(value){
  const numeric = Number(value)
  if(Number.isFinite(numeric) && numeric > 0){
    return numeric
  }
  const parsedDate = Date.parse(String(value || ""))
  if(Number.isFinite(parsedDate) && parsedDate > 0){
    return parsedDate
  }
  return NaN
}

function readClientData(){
  const raw = localStorage.getItem("clientData")
  if(!raw){
    return { raw: null, data: null }
  }
  try{
    return { raw, data: JSON.parse(raw) }
  }catch(error){
    return { raw, data: null }
  }
}

function clearClientSession(redirectToLogin=true, reason="expired"){
  const state = readClientData()
  const sessionToken = state.data && state.data.sessionToken ? String(state.data.sessionToken) : ""
  if(sessionToken){
    jsonpRequest({ action: "logout", sessionToken }, 5000).catch(()=>{})
  }
  localStorage.removeItem("clientData")
  if(redirectToLogin){
    window.location.href = reason === "logout" ? "login.html" : "login.html?expired=1"
  }
}

function getSessionState(){
  const { raw, data } = readClientData()
  if(!raw){
    return { raw: null, expired: false }
  }

  if(!data){
    return { raw: null, expired: true }
  }

  const now = Date.now()
  const sessionExpiresAt = parseSessionExpiry(data.sessionExpiresAt)
  if(Number.isFinite(sessionExpiresAt)){
    if(now >= sessionExpiresAt){
      return { raw: null, expired: true }
    }
    return { raw, expired: false }
  }

  const sessionStartedAt = Number(data.sessionStartedAt)

  if(!Number.isFinite(sessionStartedAt) || sessionStartedAt <= 0){
    data.sessionStartedAt = now
    const normalizedRaw = JSON.stringify(data)
    localStorage.setItem("clientData", normalizedRaw)
    return { raw: normalizedRaw, expired: false }
  }

  const sessionAge = now - sessionStartedAt
  if(sessionAge >= SESSION_DURATION_MS){
    return { raw: null, expired: true }
  }

  return { raw, expired: false }
}

function handleSessionExpiration(){
  if(hasExpiredSession){
    return
  }
  hasExpiredSession = true
  if(panel){
    panel.innerHTML = `\
      <div class="panel-title">
        <h3>Sesión finalizada</h3>
        <p class="empty">Tu sesión ha caducado tras 8 horas. Redirigiendo a inicio de sesión...</p>
      </div>
    `
  }
  clearClientSession(true)
}

async function validateSessionWithApi(force=false){
  const now = Date.now()
  if(!force && (now - lastValidationAt) < SESSION_VALIDATE_INTERVAL_MS){
    return
  }
  if(validationInFlight){
    return
  }

  const state = readClientData()
  if(!state.data){
    return
  }
  const sessionToken = String(state.data.sessionToken || "").trim()
  if(!sessionToken){
    return
  }

  validationInFlight = true
  try{
    const response = await jsonpRequest({
      action: "validate",
      sessionToken
    }, 10000)
    lastValidationAt = Date.now()

    if(!response || response.success !== true || response.valid === false){
      handleSessionExpiration()
      return
    }

    const apiData = (response.data && typeof response.data === "object") ? response.data : response
    const mergedData = {
      ...state.data,
      nombre: apiData.nombre || state.data.nombre || state.data.user,
      plan: apiData.plan || state.data.plan || "-",
      tipoplan: apiData.tipoplan || state.data.tipoplan || "",
      cuota: apiData.cuota || state.data.cuota || "",
      consultasocambiosrestantes: apiData.consultasocambiosrestantes || state.data.consultasocambiosrestantes || "",
      pagado: apiData.pagado || state.data.pagado || "-",
      fealta: apiData.fealta || state.data.fealta || "-",
      proxpago: apiData.proxpago || state.data.proxpago || "-",
      dominio: apiData.dominio || state.data.dominio || "-",
      npedido: apiData.npedido || state.data.npedido || "-"
    }

    const apiSessionExpiresAt = parseSessionExpiry(response.sessionExpiresAt || apiData.sessionExpiresAt)
    if(Number.isFinite(apiSessionExpiresAt)){
      mergedData.sessionExpiresAt = apiSessionExpiresAt
    }

    const mergedRaw = JSON.stringify(mergedData)
    if(mergedRaw !== state.raw){
      localStorage.setItem("clientData", mergedRaw)
    }
  }catch(error){
    lastValidationAt = Date.now()
  }finally{
    validationInFlight = false
  }
}

    let data = null
    try{

    }

    const pagadoValue = data.pagado || '-'

    const cuotaDisplay = formatEuro(data.cuota)

    panel.innerHTML = `\

          <p>Resumen de tu plan y datos clave del servicio.</p>

          <span>Estado de pago</span>
          <strong>${pagadoValue}</strong>

        </div>
      </div>
      <div class="panel-toolbar">
        <span class="panel-chip">Soporte prioritario</span>
        <span class="panel-chip">Actualizaciones incluidas</span>
        <span class="panel-chip">Estado en tiempo real</span>
      </div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Plan activo</span>
            <span class="stat-badge ${isUnpaid ? 'is-bad' : ''}">${isUnpaid ? 'Pendiente' : 'Activo'}</span>
          </div>
          <div class="stat-value">${data.plan || '-'}</div>
          <div class="stat-note">Tipo: ${data.tipoplan || '-'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Próximo pago</span>
            <span class="stat-badge">Calendario</span>
          </div>
          <div class="stat-value">${data.proxpago || '-'}</div>
          <div class="stat-note">Cuota: ${cuotaDisplay}</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Dominio</span>
            <span class="stat-badge">Web</span>
          </div>
          <div class="stat-value">${data.dominio || '-'}</div>
          <div class="stat-note">Pedido: ${data.npedido || '-'}</div>
        </div>
      </div>
      <div class="details">
        <div class="detail"><span>Tipo plan</span><strong>${data.tipoplan || '-'}</strong></div>
        <div class="detail"><span>Plan</span><strong>${data.plan}</strong></div>
        <div class="detail"><span>Cuota mensual</span><strong>${cuotaDisplay}</strong></div>
        <div class="detail"><span>Estado pago</span><strong class="${isUnpaid ? 'status-bad' : ''}">${pagadoValue}</strong></div>
        <div class="detail"><span>Fecha alta</span><strong>${data.fealta || '-'}</strong></div>
        <div class="detail"><span>Próximo pago</span><strong>${data.proxpago}</strong></div>
        <div class="detail"><span>Dominio</span><strong>${data.dominio}</strong></div>
        <div class="detail"><span>Nº pedido</span><strong>${data.npedido}</strong></div>
        <div class="detail"><span>Consultas o cambios restantes este mes</span><strong>${data.consultasocambiosrestantes || '-'}</strong></div>
      </div>
      <div class="actions">
        ${planDoc}
        <a class="secondary" href="REQUERIMIENTOS-WEBS.pdf" target="_blank" rel="noopener noreferrer">Requerimientos</a>
        <a class="secondary" href="TyC-Dominios-Web.pdf" target="_blank" rel="noopener noreferrer">TyC Dominios Web</a>
        <a class="secondary" href="AVISO LEGAL Y CONDICIONES DE USO.pdf" target="_blank" rel="noopener noreferrer">Aviso Legal</a>
        <button class="secondary" id="logoutBtn">Cerrar sesión</button>
      </div>
    `
    const logoutBtn = document.getElementById("logoutBtn")
    if(logoutBtn){
      logoutBtn.addEventListener("click",()=>{
        clearClientSession(true, "logout")
      })
    }
  }else{
    panel.innerHTML = `\
      <div class="panel-title">
        <h3>Acceso no disponible</h3>
        <p class="empty">No hay una sesión activa. Inicia sesión para ver tu panel.</p>
      </div>
      <div class="actions">
        <a class="primary" href="login.html">Iniciar Sesion</a>
      </div>
    `
  }
}

function refreshPanel(force=false){
  const sessionState = getSessionState()
  if(sessionState.expired){
    handleSessionExpiration()
    return
  }

  if(!force && sessionState.raw === lastRaw){
    validateSessionWithApi(false)
    return
  }
  lastRaw = sessionState.raw
  renderPanel(sessionState.raw)
  validateSessionWithApi(force)
}

refreshPanel(true)
setInterval(()=>refreshPanel(false),2000)

window.addEventListener("storage",(event)=>{
  if(event.key === "clientData"){
    refreshPanel(true)
  }
})

window.addEventListener("focus",()=>refreshPanel(true))
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){
    refreshPanel(true)
  }
})
</script>
