<style>
:root{
  --primary:#1565ff;
  --primary-dark:#0e49c9;
  --accent:#60a5fa;
  --ink:#0f172a;
  --muted:#64748b;
  --bg:#f4f6ff;
  --card:#ffffff;
  --stroke:rgba(15,23,42,0.08);
  --shadow:0 20px 45px rgba(15,23,42,0.12);
  --radius:18px;
  --glow:0 0 0 1px rgba(96,165,250,0.25),0 18px 32px rgba(15,23,42,0.12);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Space Grotesk","Poppins",sans-serif;
}

img{max-width:100%;height:auto;}
body{overflow-x:hidden;}

a:focus-visible,
button:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible{
  outline:3px solid rgba(21,101,255,0.55);
  outline-offset:2px;
}

body{
  background:
    radial-gradient(circle at 15% 10%,rgba(21,101,255,0.16),transparent 48%),
    radial-gradient(circle at 85% 5%,rgba(96,165,250,0.22),transparent 40%),
    radial-gradient(circle at 50% 90%,rgba(14,73,201,0.18),transparent 35%),
    var(--bg);
  color:var(--ink);
  padding-top:84px;
  min-height:100vh;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--stroke);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 8%;
  z-index:1000;
}

.header-right{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{
  height:44px;
  width:auto;
  display:block;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  text-decoration:none;
  color:#1f2937;
  font-weight:600;
}

.nav-toggle{
  display:none;
  border:none;
  background:var(--primary);
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

.theme-toggle{
  width:40px;
  height:40px;
  padding:0;
  border:1px solid rgba(148,163,184,0.4);
  border-radius:50%;
  background:#fff;
  color:#1f2937;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  transition:0.2s ease;
}

.theme-toggle:hover{
  background:#f1f5f9;
}

.theme-toggle svg{
  width:20px;
  height:20px;
  display:block;
}

.hero{
  padding:88px 8% 42px;
  text-align:center;
  color:#fff;
  background:linear-gradient(135deg,#0b1b3a,#1546b3 55%,#1f6bff);
  position:relative;
  overflow:hidden;
}

.hero::after{
  content:"";
  position:absolute;
  inset:auto -20% -40% -20%;
  height:70%;
  background:radial-gradient(circle at 20% 20%,rgba(255,255,255,0.35),transparent 55%);
  opacity:0.6;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg,rgba(7,12,24,0.15),transparent 45%,rgba(7,12,24,0.4));
}

.hero h1{
  font-size:clamp(32px,4vw,46px);
  margin-bottom:10px;
  position:relative;
  z-index:1;
}

.hero p{
  opacity:0.9;
  position:relative;
  z-index:1;
}

.wrapper{
  padding:36px 8% 70px;
}

.panel{
  max-width:980px;
  margin:0 auto;
  background:var(--card);
  padding:26px;
  border-radius:var(--radius);
  box-shadow:var(--glow);
  border:1px solid var(--stroke);
  position:relative;
  overflow:hidden;
  animation:panelIn 0.5s ease;
}

.panel::after{
  content:"";
  position:absolute;
  inset:-40% 10% auto 10%;
  height:60%;
  background:radial-gradient(circle at top,rgba(21,101,255,0.18),transparent 70%);
  pointer-events:none;
}

.panel > *{
  position:relative;
  z-index:1;
}

@keyframes panelIn{
  from{transform:translateY(12px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.panel-toolbar{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
  margin:18px 0 16px;
}

.panel-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  border-radius:999px;
  background:#eef4ff;
  border:1px solid rgba(59,130,246,0.2);
  font-size:12px;
  color:#1e3a8a;
  font-weight:600;
}

.panel-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:18px;
}

.panel-title h3{
  font-size:22px;
  margin-bottom:6px;
}

.panel-title p{
  color:var(--muted);
  font-size:14px;
}

.panel-status{
  background:#f0f5ff;
  border-radius:14px;
  padding:12px 16px;
  border:1px solid rgba(59,130,246,0.25);
  min-width:220px;
}

.panel-status span{
  display:block;
  font-size:12px;
  color:#64748b;
}

.panel-status strong{
  font-size:18px;
  color:#0f172a;
}

.panel-status small{
  display:block;
  margin-top:4px;
  font-size:12px;
  color:#475569;
}

.panel-status.is-bad{
  background:#fff1f2;
  border-color:rgba(248,113,113,0.4);
}

.panel-status.is-bad strong{
  color:#dc2626;
}

.panel-status.is-bad span{
  color:#b91c1c;
}

.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:14px;
  margin-bottom:18px;
}

.stat-card{
  background:linear-gradient(140deg,rgba(21,101,255,0.12),rgba(96,165,250,0.08));
  border-radius:16px;
  padding:14px 16px;
  border:1px solid rgba(59,130,246,0.2);
  box-shadow:0 12px 26px rgba(15,23,42,0.08);
  display:grid;
  gap:6px;
}

.stat-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

.stat-label{
  font-size:12px;
  color:#475569;
}

.stat-badge{
  padding:4px 8px;
  border-radius:999px;
  background:rgba(21,101,255,0.15);
  color:#1e3a8a;
  font-size:11px;
  font-weight:600;
}

.stat-badge.is-bad{
  background:rgba(248,113,113,0.2);
  color:#b91c1c;
}

.stat-value{
  font-size:18px;
  font-weight:700;
  color:#0f172a;
}

.stat-note{
  font-size:12px;
  color:#64748b;
}

.details{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.detail{
  background:#f8fbff;
  border-radius:14px;
  padding:14px 16px;
  border:1px solid rgba(148,163,184,0.18);
  box-shadow:0 12px 24px rgba(15,23,42,0.06);
}

.detail span{
  display:block;
  font-size:12px;
  color:#64748b;
}

.detail strong{
  font-size:15px;
  color:#0f172a;
}

.status-bad{
  color:#dc2626;
  font-weight:700;
}

.actions{
  margin-top:20px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.actions button,
.actions a{
  text-decoration:none;
  font-weight:600;
  border-radius:999px;
  padding:10px 16px;
  border:none;
  cursor:pointer;
}

.actions .primary{
  background:var(--primary);
  color:#fff;
  box-shadow:0 12px 24px rgba(21,101,255,0.22);
}

.actions .secondary{
  background:#e8f0ff;
  color:#1e3a8a;
  border:1px solid rgba(59,130,246,0.2);
}

.actions .secondary:hover{
  background:#dfe9ff;
}

.tickets{
  margin-top:22px;
  border:1px solid rgba(148,163,184,0.24);
  border-radius:16px;
  padding:16px;
  background:#f8fbff;
}

.tickets-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:8px;
}

.tickets-header h4{
  font-size:18px;
  color:#0f172a;
}

.tickets-help{
  font-size:13px;
  color:#64748b;
  margin-bottom:12px;
}

.ticket-form{
  display:grid;
  gap:10px;
}

.ticket-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
}

.ticket-field{
  display:grid;
  gap:6px;
}

.ticket-field span{
  font-size:12px;
  color:#475569;
  font-weight:600;
}

.ticket-field input,
.ticket-field select,
.ticket-field textarea{
  width:100%;
  border:1px solid rgba(148,163,184,0.35);
  border-radius:10px;
  padding:10px 12px;
  font-size:14px;
  color:#0f172a;
  background:#fff;
}

.ticket-field textarea{
  min-height:120px;
  resize:vertical;
}

.ticket-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  flex-wrap:wrap;
}

.ticket-feedback{
  font-size:13px;
  color:#64748b;
}

.ticket-feedback.is-error{
  color:#b91c1c;
}

.ticket-feedback.is-success{
  color:#0f766e;
}

.ticket-refresh{
  background:#e8f0ff;
  color:#1e3a8a;
  border:1px solid rgba(59,130,246,0.2);
  border-radius:999px;
  padding:8px 14px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

.ticket-submit{
  border:none;
  border-radius:999px;
  padding:10px 16px;
  font-weight:700;
  cursor:pointer;
  background:var(--primary);
  color:#fff;
  box-shadow:0 12px 24px rgba(21,101,255,0.22);
}

.ticket-submit:disabled{
  opacity:0.7;
  cursor:not-allowed;
}

.ticket-list{
  margin-top:14px;
  display:grid;
  gap:10px;
}

.ticket-item{
  border:1px solid rgba(148,163,184,0.25);
  border-radius:12px;
  padding:12px;
  background:#fff;
}

.ticket-item.is-resolved{
  border-color:rgba(30,64,175,0.35);
  background:linear-gradient(180deg,#ffffff,#f8fbff);
}

.ticket-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:8px;
}

.ticket-id{
  font-size:12px;
  color:#475569;
}

.ticket-last-update{
  display:block;
  margin-top:4px;
  font-size:11px;
  color:#64748b;
}

.ticket-title{
  font-size:15px;
  font-weight:700;
  color:#0f172a;
}

.ticket-meta{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}

.ticket-tag{
  font-size:11px;
  font-weight:700;
  border-radius:999px;
  padding:4px 8px;
  text-transform:uppercase;
  letter-spacing:0.3px;
}

.ticket-tag.priority-baja{
  background:#e0f2fe;
  color:#075985;
}

.ticket-tag.priority-media{
  background:#ede9fe;
  color:#5b21b6;
}

.ticket-tag.priority-alta{
  background:#fee2e2;
  color:#b91c1c;
}

.ticket-tag.status-abierto{
  background:#dcfce7;
  color:#166534;
}

.ticket-tag.status-enproceso{
  background:#fef3c7;
  color:#92400e;
}

.ticket-tag.status-resuelto{
  background:#dbeafe;
  color:#1d4ed8;
}

.ticket-text{
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.5;
  color:#334155;
}

.ticket-response{
  margin-top:10px;
  border-top:1px dashed rgba(148,163,184,0.45);
  padding-top:10px;
}

.ticket-response strong{
  display:block;
  font-size:12px;
  color:#475569;
  margin-bottom:4px;
}

.ticket-response p{
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.5;
  color:#0f172a;
}

.ticket-chat{
  margin-top:10px;
  display:grid;
  gap:8px;
}

.ticket-chat-title{
  font-size:12px;
  font-weight:700;
  color:#475569;
  text-transform:uppercase;
  letter-spacing:.3px;
}

.ticket-msg{
  padding:9px 10px;
  border-radius:10px;
  border:1px solid rgba(148,163,184,0.35);
  background:#f8fafc;
}

.ticket-msg.is-client{
  background:#eff6ff;
  border-color:#bfdbfe;
}

.ticket-msg.is-admin{
  background:#ecfeff;
  border-color:#99f6e4;
}

.ticket-msg-head{
  display:flex;
  justify-content:space-between;
  gap:8px;
  font-size:11px;
  color:#64748b;
  margin-bottom:4px;
}

.ticket-msg-body{
  white-space:pre-wrap;
  font-size:13px;
  line-height:1.45;
  color:#0f172a;
}

.ticket-reply-box{
  margin-top:10px;
  display:grid;
  gap:8px;
  border-top:1px dashed rgba(148,163,184,0.45);
  padding-top:10px;
}

.ticket-reply-text{
  width:100%;
  border:1px solid rgba(148,163,184,0.35);
  border-radius:10px;
  padding:10px 12px;
  font-size:13px;
  color:#0f172a;
  background:#fff;
  min-height:84px;
  resize:vertical;
}

.ticket-reply-actions{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}

.ticket-reply-feedback{
  font-size:12px;
  color:#64748b;
}

.ticket-reply-feedback.is-error{
  color:#b91c1c;
}

.ticket-reply-feedback.is-success{
  color:#0f766e;
}

.ticket-reply-send{
  border:none;
  border-radius:999px;
  padding:8px 12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
  background:#1d4ed8;
  color:#fff;
}

.ticket-reply-send:disabled,
.ticket-reply-text:disabled{
  opacity:.65;
  cursor:not-allowed;
}

.ticket-closed-note{
  font-size:12px;
  color:#1e3a8a;
  font-weight:600;
}

.empty{
  text-align:center;
  color:var(--muted);
}

footer{
  background:linear-gradient(135deg,#0f3aa8,#1565ff 55%,#1f6bff);
  color:white;
  text-align:center;
  padding:40px 8%;
  margin-top:80px;
  position:relative;
}

.footer-copy{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.footer-copy img{
  width:30px;
  height:30px;
  object-fit:contain;
  display:block;
}

.footer-socials{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:12px;
}

.footer-instagram{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:34px;
  height:34px;
  border-radius:50%;
  background:rgba(255,255,255,0.16);
  color:#ffffff;
  text-decoration:none;
  transition:0.2s ease;
}

.footer-instagram:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.28);
}

.footer-instagram svg{
  width:18px;
  height:18px;
  display:block;
}

.footer-preferences{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:rgba(255,255,255,0.16);
  border:1px solid rgba(255,255,255,0.3);
  color:#fff;
  text-decoration:none;
  font-size:12px;
  font-weight:600;
  position:absolute;
  right:35px;
  bottom:35px;
}

.footer-legal{
  margin-top:10px;
}

.footer-legal a{
  color:rgba(255,255,255,0.85);
  font-size:13px;
  text-decoration:none;
}

.footer-legal a:hover{
  text-decoration:underline;
}

function formatEuro(value){
  const raw = String(value || '').replace('€','').trim()
  if(!raw) return '-'
  if(/[a-zA-Z]/.test(raw)) return value
  let num = null
  if(/^[0-9]+([.,][0-9]+)?$/.test(raw)){
    if(raw.includes('.') && raw.includes(',')){
      num = Number(raw.replace(/\./g,'').replace(',','.'))
    }else if(raw.includes(',')){
      num = Number(raw.replace(',','.'))
    }else{
      num = Number(raw)
    }
  }
  if(num === null || !Number.isFinite(num)) return value
  return new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR'}).format(num)
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;")
}

function formatDateTime(value){
  const raw = String(value || "").trim()
  if(!raw) return "-"
  const parsed = Date.parse(raw)
  if(!Number.isFinite(parsed)) return raw
  return new Intl.DateTimeFormat("es-ES",{
    dateStyle:"medium",
    timeStyle:"short"
  }).format(new Date(parsed))
}

const URL_API = "https://script.google.com/macros/s/AKfycbxZeMApnIjxoF4aAPxNhcLbUb09JluFb4E7jP67bINuODTv08q9xDFtzC5updMnV_Gi/exec"
const panel = document.getElementById("panelContent")
const SESSION_DURATION_MS = 8 * 60 * 60 * 1000
const SESSION_VALIDATE_INTERVAL_MS = 60 * 1000
let lastRaw = null
let hasExpiredSession = false
let validationInFlight = false
let lastValidationAt = 0

async function apiPostRequest(payload, timeoutMs=10000){
  const controller = new AbortController()
  const timeoutId = setTimeout(()=>controller.abort(), timeoutMs)
  try{
    const response = await fetch(URL_API, {
      method: "POST",
      mode: "cors",
      cache: "no-store",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload || {}),
      signal: controller.signal
    })
    if(!response.ok){
      throw new Error("HTTP_" + response.status)
    }
    return await response.json()
  }catch(error){
    if(error && error.name === "AbortError"){
      throw new Error("TIMEOUT")
    }
    throw error
  }finally{
    clearTimeout(timeoutId)
  }
}

function parseSessionExpiry(value){
  const numeric = Number(value)
  if(Number.isFinite(numeric) && numeric > 0){
    return numeric
  }
  const parsedDate = Date.parse(String(value || ""))
  if(Number.isFinite(parsedDate) && parsedDate > 0){
    return parsedDate
  }
  return NaN
}

function readClientData(){
  const raw = localStorage.getItem("clientData")
  if(!raw){
    return { raw: null, data: null }
  }
  try{
    return { raw, data: JSON.parse(raw) }
  }catch(error){
    return { raw, data: null }
  }
}

function clearClientSession(redirectToLogin=true, reason="expired"){
  const state = readClientData()
  const sessionToken = state.data && state.data.sessionToken ? String(state.data.sessionToken) : ""
  if(sessionToken){
    apiPostRequest({ action: "logout", sessionToken }, 5000).catch(()=>{})
  }
  localStorage.removeItem("clientData")
  if(redirectToLogin){
    window.location.href = reason === "logout" ? "login.html" : "login.html?expired=1"
  }
}

function getSessionState(){
  const { raw, data } = readClientData()
  if(!raw){
    return { raw: null, expired: false }
  }

  if(!data){
    return { raw: null, expired: true }
  }

  const now = Date.now()
  const sessionExpiresAt = parseSessionExpiry(data.sessionExpiresAt)
  if(Number.isFinite(sessionExpiresAt)){
    if(now >= sessionExpiresAt){
      return { raw: null, expired: true }
    }
    return { raw, expired: false }
  }

  const sessionStartedAt = Number(data.sessionStartedAt)

  if(!Number.isFinite(sessionStartedAt) || sessionStartedAt <= 0){
    data.sessionStartedAt = now
    const normalizedRaw = JSON.stringify(data)
    localStorage.setItem("clientData", normalizedRaw)
    return { raw: normalizedRaw, expired: false }
  }

  const sessionAge = now - sessionStartedAt
  if(sessionAge >= SESSION_DURATION_MS){
    return { raw: null, expired: true }
  }

  return { raw, expired: false }
}

function handleSessionExpiration(){
  if(hasExpiredSession){
    return
  }
  hasExpiredSession = true
  if(panel){
    panel.innerHTML = `\
      <div class="panel-title">
        <h3>Sesión finalizada</h3>
        <p class="empty">Tu sesión ha caducado tras 8 horas. Redirigiendo a inicio de sesión...</p>
      </div>
    `
  }
  clearClientSession(true)
}

async function validateSessionWithApi(force=false){
  const now = Date.now()
  if(!force && (now - lastValidationAt) < SESSION_VALIDATE_INTERVAL_MS){
    return
  }
  if(validationInFlight){
    return
  }

  const state = readClientData()
  if(!state.data){
    return
  }
  const sessionToken = String(state.data.sessionToken || "").trim()
  if(!sessionToken){
    return
  }

  validationInFlight = true
  try{
    const response = await apiPostRequest({
      action: "validate",
      sessionToken
    }, 10000)
    lastValidationAt = Date.now()

    if(!response || response.success !== true || response.valid === false){
      handleSessionExpiration()
      return
    }

    const apiData = (response.data && typeof response.data === "object") ? response.data : response
    const mergedData = {
      ...state.data,
      nombre: apiData.nombre || state.data.nombre || state.data.user,
      plan: apiData.plan || state.data.plan || "-",
      tipoplan: apiData.tipoplan || state.data.tipoplan || "",
      cuota: apiData.cuota || state.data.cuota || "",
      consultasocambiosrestantes: apiData.consultasocambiosrestantes || state.data.consultasocambiosrestantes || "",
      pagado: apiData.pagado || state.data.pagado || "-",
      fealta: apiData.fealta || state.data.fealta || "-",
      proxpago: apiData.proxpago || state.data.proxpago || "-",
      dominio: apiData.dominio || state.data.dominio || "-",
      npedido: apiData.npedido || state.data.npedido || "-"
    }

    const apiSessionExpiresAt = parseSessionExpiry(response.sessionExpiresAt || apiData.sessionExpiresAt)
    if(Number.isFinite(apiSessionExpiresAt)){
      mergedData.sessionExpiresAt = apiSessionExpiresAt
    }

    const mergedRaw = JSON.stringify(mergedData)
    if(mergedRaw !== state.raw){
      localStorage.setItem("clientData", mergedRaw)
    }
  }catch(error){
    lastValidationAt = Date.now()
  }finally{
    validationInFlight = false
  }
}

function setTicketFeedback(message, type=""){
  const feedback = document.getElementById("ticketFeedback")
  if(!feedback) return
  feedback.textContent = message || ""
  feedback.className = "ticket-feedback" + (type ? " is-" + type : "")
}

function renderTicketMessages(messages){
  const list = Array.isArray(messages) ? messages : []
  if(!list.length){
    return '<p class="empty">Sin mensajes todavía.</p>'
  }

  return list.map((msg)=>{
    const roleRaw = String(msg.senderRole || "client").toLowerCase()
    const role = roleRaw === "admin" ? "admin" : "client"
    const roleLabel = role === "admin" ? "Soporte LuckyBase" : "Tú"
    return `\
      <div class="ticket-msg is-${escapeHtml(role)}">
        <div class="ticket-msg-head">
          <strong>${escapeHtml(roleLabel)}</strong>
          <span>${escapeHtml(formatDateTime(msg.createdAt))}</span>
        </div>
        <div class="ticket-msg-body">${escapeHtml(msg.message || "")}</div>
      </div>
    `
  }).join("")
}

function bindTicketReplyButtons(){
  const buttons = document.querySelectorAll(".ticket-reply-send")
  buttons.forEach((button)=>{
    button.addEventListener("click", async ()=>{
      if(button.hasAttribute("data-closed")){
        return
      }
      const ticketId = String(button.getAttribute("data-ticket-id") || "")
      const card = button.closest(".ticket-item")
      const textEl = card ? card.querySelector(".ticket-reply-text") : null
      const feedbackEl = card ? card.querySelector(".ticket-reply-feedback") : null
      const message = textEl ? String(textEl.value || "").trim() : ""

      if(!ticketId){
        return
      }
      if(!message || message.length < 2){
        if(feedbackEl){
          feedbackEl.textContent = "El mensaje debe tener al menos 2 caracteres."
          feedbackEl.className = "ticket-reply-feedback is-error"
        }
        return
      }

      const state = readClientData()
      const sessionToken = state.data && state.data.sessionToken ? String(state.data.sessionToken).trim() : ""
      if(!sessionToken){
        if(feedbackEl){
          feedbackEl.textContent = "Sesión no activa."
          feedbackEl.className = "ticket-reply-feedback is-error"
        }
        return
      }

      button.disabled = true
      if(feedbackEl){
        feedbackEl.textContent = "Enviando..."
        feedbackEl.className = "ticket-reply-feedback"
      }
      try{
        const response = await apiPostRequest({
          action: "client_reply_ticket",
          sessionToken,
          ticketId,
          message
        }, 30000)

        if(!response || response.success !== true){
          const errorMessage = response && response.message ? response.message : "No se pudo enviar la respuesta."
          if(feedbackEl){
            feedbackEl.textContent = errorMessage
            feedbackEl.className = "ticket-reply-feedback is-error"
          }
          return
        }

        if(textEl){
          textEl.value = ""
        }
        if(feedbackEl){
          feedbackEl.textContent = "Mensaje enviado."
          feedbackEl.className = "ticket-reply-feedback is-success"
        }
        loadTickets(false)
      }catch(error){
        if(feedbackEl){
          feedbackEl.textContent = "No se pudo enviar la respuesta."
          feedbackEl.className = "ticket-reply-feedback is-error"
        }
      }finally{
        button.disabled = false
      }
    })
  })
}

function renderTicketList(tickets){
  const container = document.getElementById("ticketList")
  if(!container) return
  if(!Array.isArray(tickets) || !tickets.length){
    container.innerHTML = '<p class="empty">Todavía no has creado tickets.</p>'
    return
  }

  const html = tickets.map((ticket)=>{
    const priorityRaw = String(ticket.prioridad || "media").toLowerCase()
    const statusRaw = String(ticket.estado || "abierto").toLowerCase()
    const priority = priorityRaw === "alta" ? "alta" : (priorityRaw === "baja" ? "baja" : "media")
    const status = statusRaw === "resuelto" ? "resuelto" : (statusRaw === "en_proceso" ? "enproceso" : "abierto")
    const statusLabel = status === "enproceso" ? "en proceso" : status
    const messagesHtml = renderTicketMessages(ticket.messages || [])
    const isClosed = status === "resuelto"
    const updatedAtText = ticket.updatedAt ? formatDateTime(ticket.updatedAt) : formatDateTime(ticket.createdAt)

    return `\
      <article class="ticket-item ${isClosed ? 'is-resolved' : ''}">
        <div class="ticket-top">
          <div>
            <div class="ticket-title">${escapeHtml(ticket.asunto || "-")}</div>
            <div class="ticket-id">${escapeHtml(ticket.ticketId || "-")} · ${escapeHtml(formatDateTime(ticket.createdAt))}</div>
            <span class="ticket-last-update">Última actualización: ${escapeHtml(updatedAtText)}</span>
          </div>
          <div class="ticket-meta">
            <span class="ticket-tag priority-${escapeHtml(priority)}">${escapeHtml(priority)}</span>
            <span class="ticket-tag status-${escapeHtml(status)}">${escapeHtml(statusLabel)}</span>
          </div>
        </div>
        <div class="ticket-chat">
          <div class="ticket-chat-title">Conversación</div>
          ${messagesHtml}
        </div>
        <div class="ticket-reply-box">
          ${isClosed ? '<span class="ticket-closed-note">Ticket resuelto. No se admiten más respuestas.</span>' : ''}
          <textarea class="ticket-reply-text" maxlength="4000" placeholder="Escribe una respuesta para continuar el ticket..." ${isClosed ? 'disabled' : ''}></textarea>
          <div class="ticket-reply-actions">
            <span class="ticket-reply-feedback"></span>
            <button class="ticket-reply-send" type="button" data-ticket-id="${escapeHtml(ticket.ticketId || "")}" ${isClosed ? 'data-closed disabled' : ''}>Responder</button>
          </div>
        </div>
      </article>
    `
  }).join("")

  container.innerHTML = html
  bindTicketReplyButtons()
}

async function loadTickets(showLoading=true){
  const container = document.getElementById("ticketList")
  if(!container){
    return
  }
  const state = readClientData()
  const sessionToken = state.data && state.data.sessionToken ? String(state.data.sessionToken).trim() : ""
  if(!sessionToken){
    container.innerHTML = '<p class="empty">No hay sesión activa.</p>'
    return
  }

  if(showLoading){
    container.innerHTML = '<p class="empty">Cargando tickets...</p>'
  }

  try{
    const response = await apiPostRequest({
      action: "list_tickets",
      sessionToken
    }, 30000)
    if(!response || response.success !== true){
      throw new Error("LIST_FAILED")
    }
    renderTicketList(response.tickets || [])
  }catch(error){
    container.innerHTML = '<p class="empty">No se pudieron cargar tus tickets.</p>'
  }
}

function bindTicketModule(){
  const form = document.getElementById("ticketForm")
  const refreshBtn = document.getElementById("refreshTicketsBtn")
  const submitBtn = document.getElementById("ticketSubmitBtn")

  if(refreshBtn){
    refreshBtn.addEventListener("click",()=>{
      setTicketFeedback("")
      loadTickets(true)
    })
  }

  if(!form || !submitBtn){
    return
  }

  form.addEventListener("submit", async (event)=>{
    event.preventDefault()
    const subjectInput = document.getElementById("ticketSubject")
    const priorityInput = document.getElementById("ticketPriority")
    const messageInput = document.getElementById("ticketMessage")
    const asunto = subjectInput ? String(subjectInput.value || "").trim() : ""
    const prioridad = priorityInput ? String(priorityInput.value || "media").trim() : "media"
    const mensaje = messageInput ? String(messageInput.value || "").trim() : ""
    const state = readClientData()
    const sessionToken = state.data && state.data.sessionToken ? String(state.data.sessionToken).trim() : ""

    if(!sessionToken){
      setTicketFeedback("Tu sesión no está activa.", "error")
      return
    }
    if(asunto.length < 4){
      setTicketFeedback("El asunto debe tener al menos 4 caracteres.", "error")
      return
    }
    if(mensaje.length < 10){
      setTicketFeedback("El mensaje debe tener al menos 10 caracteres.", "error")
      return
    }

    submitBtn.disabled = true
    setTicketFeedback("Enviando ticket...")
    try{
      const response = await apiPostRequest({
        action: "create_ticket",
        sessionToken,
        asunto,
        prioridad,
        mensaje,
        source: "panel_cliente"
      }, 30000)

      if(!response || response.success !== true){
        const message = response && response.message ? response.message : "No se pudo crear el ticket."
        setTicketFeedback(message, "error")
        return
      }

      form.reset()
      setTicketFeedback("Ticket enviado correctamente.", "success")
      loadTickets(false)
    }catch(error){
      setTicketFeedback("No se pudo crear el ticket.", "error")
    }finally{
      submitBtn.disabled = false
    }
  })

  loadTickets(true)
}

      <div class="stats-grid">

            <span class="stat-label">Plan activo</span>
            <span class="stat-badge ${isUnpaid ? 'is-bad' : ''}">${isUnpaid ? 'Pendiente' : 'Activo'}</span>
          </div>
          <div class="stat-value">${data.plan || '-'}</div>
          <div class="stat-note">Tipo: ${data.tipoplan || '-'}</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Próximo pago</span>
            <span class="stat-badge">Calendario</span>
          </div>
          <div class="stat-value">${data.proxpago || '-'}</div>
          <div class="stat-note">Cuota: ${cuotaDisplay}</div>
        </div>
        <div class="stat-card">
          <div class="stat-top">
            <span class="stat-label">Dominio</span>
            <span class="stat-badge">Web</span>
          </div>
          <div class="stat-value">${data.dominio || '-'}</div>
          <div class="stat-note">Pedido: ${data.npedido || '-'}</div>
        </div>
      </div>
      <div class="details">
        <div class="detail"><span>Tipo plan</span><strong>${data.tipoplan || '-'}</strong></div>
        <div class="detail"><span>Plan</span><strong>${data.plan}</strong></div>
        <div class="detail"><span>Cuota mensual</span><strong>${cuotaDisplay}</strong></div>
        <div class="detail"><span>Estado pago</span><strong class="${isUnpaid ? 'status-bad' : ''}">${pagadoValue}</strong></div>
        <div class="detail"><span>Fecha alta</span><strong>${data.fealta || '-'}</strong></div>
        <div class="detail"><span>Próximo pago</span><strong>${data.proxpago}</strong></div>
        <div class="detail"><span>Dominio</span><strong>${data.dominio}</strong></div>
        <div class="detail"><span>Nº pedido</span><strong>${data.npedido}</strong></div>
        <div class="detail"><span>Consultas o cambios restantes este mes</span><strong>${data.consultasocambiosrestantes || '-'}</strong></div>
      </div>
      <section class="tickets">
        <div class="tickets-header">
          <h4>Soporte y tickets</h4>
          <button class="ticket-refresh" id="refreshTicketsBtn" type="button">Actualizar</button>
        </div>
        <p class="tickets-help">Abre tickets y responde en el mismo hilo tipo chat. Si el estado es <strong>resuelto</strong>, el ticket queda cerrado.</p>
        <form id="ticketForm" class="ticket-form" novalidate>
          <div class="ticket-grid">
            <label class="ticket-field">
              <span>Asunto</span>
              <input id="ticketSubject" type="text" maxlength="140" placeholder="Ej: Cambio en la home">
            </label>
            <label class="ticket-field">
              <span>Prioridad</span>
              <select id="ticketPriority">
                <option value="baja">Baja</option>
                <option value="media" selected>Media</option>
                <option value="alta">Alta</option>
              </select>
            </label>
          </div>
          <label class="ticket-field">
            <span>Mensaje</span>
            <textarea id="ticketMessage" maxlength="4000" placeholder="Describe tu solicitud con detalle."></textarea>
          </label>
          <div class="ticket-actions">
            <span id="ticketFeedback" class="ticket-feedback"></span>

        </div>

    const logoutBtn = document.getElementById("logoutBtn")
    if(logoutBtn){
      logoutBtn.addEventListener("click",()=>{
        clearClientSession(true, "logout")
      })
    }
    bindTicketModule()
  }else{
    panel.innerHTML = `\
      <div class="panel-title">
        <h3>Acceso no disponible</h3>
        <p class="empty">No hay una sesión activa. Inicia sesión para ver tu panel.</p>
      </div>
      <div class="actions">
        <a class="primary" href="login.html">Iniciar Sesion</a>
      </div>
    `
  }
}

function refreshPanel(force=false){
  const sessionState = getSessionState()
  if(sessionState.expired){
    handleSessionExpiration()
    return
  }

  if(!force && sessionState.raw === lastRaw){
    validateSessionWithApi(false)
    return
  }
  lastRaw = sessionState.raw
  renderPanel(sessionState.raw)
  validateSessionWithApi(force)
}

refreshPanel(true)
setInterval(()=>refreshPanel(false),2000)

window.addEventListener("storage",(event)=>{
  if(event.key === "clientData"){
    refreshPanel(true)
  }
})

window.addEventListener("focus",()=>refreshPanel(true))
document.addEventListener("visibilitychange",()=>{
  if(!document.hidden){
    refreshPanel(true)
  }
})
</script>
