<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f8ff;
color:#1f2937;
padding-top:90px;
min-height:100vh;
background-image:radial-gradient(circle at 20% 20%,rgba(21,101,255,0.15),transparent 45%),radial-gradient(circle at 80% 10%,rgba(96,165,250,0.2),transparent 42%),radial-gradient(circle at 50% 90%,rgba(14,73,201,0.18),transparent 40%);
}

header{
position:fixed;
top:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 8%;
box-shadow:0 5px 20px rgba(0,0,0,0.06);
z-index:1000;
}

.logo img{
height:48px;
width:auto;
display:block;
}

nav{
display:flex;
gap:20px;
}

nav a{
text-decoration:none;
color:#334155;
font-weight:500;
}

.nav-toggle{
display:none;
border:none;
background:#1565ff;
color:#fff;
padding:8px 12px;
border-radius:10px;
font-weight:600;
cursor:pointer;
}

.theme-toggle{
width:40px;
height:40px;
padding:0;
border:1px solid #d1d5db;
border-radius:50%;
background:#fff;
color:#1f2937;
cursor:pointer;
display:inline-flex;
align-items:center;
justify-content:center;
transition:0.3s;
}

.theme-toggle:hover{
background:#f3f4f6;
}

.theme-toggle svg{
width:20px;
height:20px;
display:block;
}

.hero{
padding:70px 8% 30px;
text-align:center;
color:#fff;
background:linear-gradient(120deg,#1565ff,#3b82f6,#60a5fa);
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
opacity:0.95;
}

.wrapper{
padding:30px 8% 60px;
}

.panel{
max-width:860px;
margin:0 auto;
background:#fff;
padding:24px;
border-radius:16px;
box-shadow:0 12px 30px rgba(15,23,42,0.08);
border:1px solid rgba(148,163,184,0.2);
}

.panel h3{
font-size:20px;
color:#1e40af;
margin-bottom:16px;
}

.details{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:14px;
}

.detail{
background:#f8fbff;
border-radius:12px;
padding:14px;
border:1px solid rgba(148,163,184,0.2);
}

.detail span{
display:block;
font-size:12px;
color:#64748b;
}

.detail strong{
font-size:15px;
color:#0f172a;
}

.status-bad{
color:#dc2626;
font-weight:700;
}

.actions{
margin-top:18px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button,
.actions a{
text-decoration:none;
font-weight:600;
border-radius:8px;
padding:10px 14px;
border:none;
cursor:pointer;
}

.actions .primary{
background:#1565ff;
color:#fff;
}

.actions .secondary{
background:#e5edff;
color:#1e40af;
}

.empty{
text-align:center;
color:#64748b;
}

footer{
background:#1565ff;
color:white;
text-align:center;
padding:35px;
margin-top:80px;
position:relative;
}

.footer-copy{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.footer-copy img{
width:30px;
height:30px;
object-fit:contain;
display:block;
}

.footer-socials{
display:flex;
justify-content:center;
gap:10px;
margin-top:12px;
}

.footer-instagram{
display:inline-flex;
align-items:center;
justify-content:center;
width:34px;
height:34px;
border-radius:50%;
background:#fff;
color:#1565ff;
text-decoration:none;
transition:0.3s;
}

.footer-instagram:hover{
transform:scale(1.08);
background:#f3f6ff;
}

.footer-instagram svg{
width:18px;
height:18px;
display:block;
}

.footer-preferences{
display:inline-block;
padding:6px 10px;
border-radius:8px;
background:#fff;
color:#1565ff;
text-decoration:none;
font-size:12px;
font-weight:600;
transition:0.3s;
position:absolute;
right:35px;
bottom:35px;
}

.footer-preferences:hover{
background:#f3f6ff;
}

.footer-legal{
margin-top:10px;
}

.footer-legal a{
color:#dbeafe;
font-size:13px;
text-decoration:none;
}

.footer-legal a:hover{
text-decoration:underline;
}

body.dark-mode{
background:#0f172a;
color:#e2e8f0;
background-image:radial-gradient(circle at 20% 20%,rgba(59,130,246,0.2),transparent 45%),radial-gradient(circle at 80% 10%,rgba(37,99,235,0.25),transparent 42%),radial-gradient(circle at 50% 90%,rgba(15,23,42,0.6),transparent 40%);
}

body.dark-mode header{
background:#111827;
box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

body.dark-mode nav a{
color:#e5e7eb;
}

body.dark-mode .theme-toggle{
background:#1f2937;
border-color:#374151;
color:#f9fafb;
}

body.dark-mode .theme-toggle:hover{
background:#374151;
}

body.dark-mode .nav-toggle{
background:#3b82f6;
}

body.dark-mode .panel{
background:#1e293b;
box-shadow:0 12px 30px rgba(0,0,0,0.35);
border-color:#334155;
}

body.dark-mode .panel h3{
color:#93c5fd;
}

body.dark-mode .detail{
background:#0f172a;
border-color:#334155;
}

body.dark-mode .detail span{
color:#94a3b8;
}

body.dark-mode .detail strong{
color:#f8fafc;
}

body.dark-mode .status-bad{
color:#f87171;
}

body.dark-mode footer{
background:#0b1220;
}

body.dark-mode .footer-preferences{
background:#1e293b;
color:#93c5fd;
}

@media(max-width:768px){
body{
padding-top:106px;
}

header{
padding:10px 4%;
flex-wrap:wrap;
gap:8px;
}

nav{
width:100%;
display:none;
flex-direction:column;
align-items:center;
gap:8px;
padding:10px 0 4px;
background:#fff;
border-radius:12px;
box-shadow:0 12px 30px rgba(15,23,42,0.12);
}

nav a{
font-size:13px;
flex:0 0 auto;
}

nav.is-open{
display:flex;
}

.nav-toggle{
display:inline-flex;
align-items:center;
justify-content:center;
}

.theme-toggle{
width:34px;
height:34px;
}

.logo img{
height:30px;
}

.hero{
padding:46px 5% 24px;
}

.hero h1{
font-size:32px;
}

.wrapper{
padding:22px 5% 50px;
}

.footer-preferences{
position:static;
margin-top:12px;
}
}
</style>

<script>
const themeToggle=document.getElementById("themeToggle")
const mainNav=document.getElementById("mainNav")
const navToggle=document.getElementById("navToggle")
const sunIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="4"></circle><line x1="12" y1="2" x2="12" y2="5"></line><line x1="12" y1="19" x2="12" y2="22"></line><line x1="2" y1="12" x2="5" y2="12"></line><line x1="19" y1="12" x2="22" y2="12"></line><line x1="4.9" y1="4.9" x2="7" y2="7"></line><line x1="17" y1="17" x2="19.1" y2="19.1"></line><line x1="17" y1="7" x2="19.1" y2="4.9"></line><line x1="4.9" y1="19.1" x2="7" y2="17"></line></svg>'
const moonIcon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 1 0 9.8 9.8z"></path></svg>'

function updateThemeLabel(){
const isDarkMode=document.body.classList.contains("dark-mode")
if(themeToggle){
themeToggle.innerHTML=isDarkMode?moonIcon:sunIcon
themeToggle.setAttribute("aria-label",isDarkMode?"Modo oscuro":"Modo claro")
themeToggle.setAttribute("title",isDarkMode?"Modo oscuro":"Modo claro")
}
}

if(localStorage.getItem("theme")==="dark"){
document.body.classList.add("dark-mode")
}
updateThemeLabel()

if(themeToggle){
themeToggle.addEventListener("click",()=>{
document.body.classList.toggle("dark-mode")
const currentTheme=document.body.classList.contains("dark-mode")?"dark":"light"
localStorage.setItem("theme",currentTheme)
updateThemeLabel()
})
}

if(navToggle && mainNav){
  navToggle.addEventListener("click",()=>{
    const isOpen=mainNav.classList.toggle("is-open")
    navToggle.setAttribute("aria-label",isOpen?"Cerrar menú":"Abrir menú")
    navToggle.textContent=isOpen?"Cerrar":"Menú"
  })

  mainNav.querySelectorAll("a").forEach((link)=>{
    link.addEventListener("click",()=>{
      if(window.innerWidth<=768){
        mainNav.classList.remove("is-open")
        navToggle.setAttribute("aria-label","Abrir menú")
        navToggle.textContent="Menú"
      }
    })
  })
}

const panel = document.getElementById("panelContent")
const raw = localStorage.getItem("clientData")
if(raw){
  const data = JSON.parse(raw)
  const planKey = String(data.plan || '').toLowerCase()
  let planDoc = ''
  if(planKey.includes('basic')){
    planDoc = '<a class=\"secondary\" href=\"TyC-LuckyWeb-Basic.pdf\" target=\"_blank\" rel=\"noopener noreferrer\">TyC LuckyWeb Basic</a>'
  }else if(planKey.includes('corporativa')){
    planDoc = '<a class=\"secondary\" href=\"TyC-LuckyWeb-Corporativa.pdf\" target=\"_blank\" rel=\"noopener noreferrer\">TyC LuckyWeb Corporativa</a>'
  }else if(planKey.includes('ecommerce') || planKey.includes('e-commerce')){
    planDoc = '<a class=\"secondary\" href=\"TyC-LuckyWeb-Ecommerce.pdf\" target=\"_blank\" rel=\"noopener noreferrer\">TyC LuckyWeb Ecommerce</a>'
  }else{
    planDoc = '<a class=\"secondary\" href=\"terminos-contratacion-web.html\">Ver documentación completa</a>'
  }

  const pagadoValue = data.pagado || '-'
  const isUnpaid = /^no\b/i.test(String(pagadoValue).trim())

  panel.innerHTML = `\
    <h3>Bienvenido, ${data.nombre || data.user}</h3>
    <div class="details">
      <div class="detail"><span>Plan</span><strong>${data.plan}</strong></div>
      <div class="detail"><span>Tipo plan</span><strong>${data.tipoplan || '-'}</strong></div>
      <div class="detail"><span>Cuota</span><strong>${data.cuota || '-'}</strong></div>
      <div class="detail"><span>Pagado</span><strong class="${isUnpaid ? 'status-bad' : ''}">${pagadoValue}</strong></div>
      <div class="detail"><span>Fecha alta</span><strong>${data.fealta || '-'}</strong></div>
      <div class="detail"><span>Próximo pago</span><strong>${data.proxpago}</strong></div>
      <div class="detail"><span>Dominio</span><strong>${data.dominio}</strong></div>
      <div class="detail"><span>Nº pedido</span><strong>${data.npedido}</strong></div>
    </div>
    <div class="actions">
      ${planDoc}
      <a class="secondary" href="REQUERIMIENTOS-WEBS.pdf" target="_blank" rel="noopener noreferrer">Requerimientos</a>
      <a class="secondary" href="TyC-Dominios-Web.pdf" target="_blank" rel="noopener noreferrer">TyC Dominios Web</a>
      <a class="secondary" href="AVISO LEGAL Y CONDICIONES DE USO.pdf" target="_blank" rel="noopener noreferrer">Aviso Legal</a>
      <button class="secondary" id="logoutBtn">Cerrar sesión</button>
    </div>
  `
  const logoutBtn = document.getElementById("logoutBtn")
  logoutBtn.addEventListener("click",()=>{
    localStorage.removeItem("clientData")
    window.location.href = "login.html"
  })
}else{
  panel.innerHTML = `\
    <h3>Acceso no disponible</h3>
    <p class="empty">No hay una sesión activa. Inicia sesión para ver tu panel.</p>
    <div class="actions">
      <a class="primary" href="login.html">Iniciar Sesion</a>
    </div>
  `
}
</script>
