name: Actualizar productos de Vinted

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Lunes 04:00 UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio (sin actions externas)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" repo
          cd repo
          git checkout "${{ github.ref_name }}"
          echo "REPO_DIR=$PWD" >> "$GITHUB_ENV"

      - name: Instalar dependencias
        run: |
          set -euo pipefail
          python3 --version
          python3 -m pip install --upgrade pip
          python3 -m pip install requests beautifulsoup4 cloudscraper

      - name: Ejecutar scraper
        working-directory: ${{ env.REPO_DIR }}
        env:
          VINTED_PROFILE_URL: ${{ secrets.VINTED_PROFILE_URL || vars.VINTED_PROFILE_URL }}
        run: |
          set -euo pipefail
          python3 scraper.py

      - name: Commit y push de productos.json
        working-directory: ${{ env.REPO_DIR }}
        run: |
          set -euo pipefail
          if git diff --quiet -- productos.json; then
            echo "Sin cambios en productos.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add productos.json
          git commit -m "chore: actualizar productos.json [skip ci]"
          git push origin "${{ github.ref_name }}"
