name: Actualizar productos de Vinted

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1" # Lunes 04:00 UTC

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 cloudscraper

      - name: Ejecutar scraper
        env:
          VINTED_PROFILE_URL: ${{ secrets.VINTED_PROFILE_URL || vars.VINTED_PROFILE_URL }}
        run: python scraper.py

      - name: Commit y push de productos.json
        run: |
          if git diff --quiet -- productos.json; then
            echo "Sin cambios en productos.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add productos.json
          git commit -m "chore: actualizar productos.json [skip ci]"
          git push
