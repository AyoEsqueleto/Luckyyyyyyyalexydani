<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="stylesheet" href="cookie-consent.css">
  <script src="cookie-consent.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Últimos productos publicados en Vinted por LuckyBase.">
  <title>Productos Vinted | LuckyBase</title>
  <meta name="theme-color" content="#1565ff">
  <link rel="canonical" href="https://luckybase.es/reventa-vinted.html">
  <link rel="apple-touch-icon" href="https://luckybase.es/apple-touch-icon.png">
  <link rel="icon" href="https://luckybase.es/favicon.ico" type="image/x-icon">
  <link rel="icon" sizes="32x32" href="https://luckybase.es/favicon-32x32.png">
  <link rel="icon" sizes="16x16" href="https://luckybase.es/favicon-16x16.png">
  <link rel="manifest" href="https://luckybase.es/site.webmanifest">
  <link rel="stylesheet" href="premium.css">
  <style>
    :root{
      --bg:#f6f8ff;
      --ink:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,0.12);
      --card:#ffffff;
      --brand:#1565ff;
      --radius:16px;
      --shadow:0 14px 30px rgba(15,23,42,0.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Poppins',sans-serif;
      background:var(--bg);
      color:var(--ink);
      min-height:100vh;
      padding-top:86px;
    }
    img{max-width:100%;height:auto;display:block}
    header{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      z-index:1000;
      background:#fff;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 8%;
    }
    .logo img{height:42px}
    nav{
      display:flex;
      gap:20px;
      align-items:center;
    }
    nav a{
      color:#334155;
      text-decoration:none;
      font-weight:600;
      font-size:14px;
    }
    nav a:hover{color:var(--brand)}

    main{padding:42px 8% 70px}
    .hero{
      background:linear-gradient(130deg,#1565ff,#1d4ed8);
      color:#fff;
      border-radius:22px;
      padding:30px;
      box-shadow:0 16px 40px rgba(21,101,255,0.28);
    }
    .hero h1{
      margin:0 0 10px;
      font-size:34px;
      font-family:"Space Grotesk",sans-serif;
    }
    .hero p{
      margin:0;
      opacity:0.95;
      max-width:820px;
      line-height:1.6;
    }

    .status{
      margin:18px 4px 0;
      color:var(--muted);
      font-size:14px;
    }

    .grid{
      margin-top:20px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:22px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .media{
      border-radius:12px;
      overflow:hidden;
      background:#e2e8f0;
      aspect-ratio:4/5;
    }
    .media img{
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .badge{
      width:max-content;
      font-size:11px;
      font-weight:700;
      letter-spacing:0.04em;
      text-transform:uppercase;
      padding:5px 10px;
      border-radius:999px;
      background:#dbeafe;
      color:#1d4ed8;
    }
    .title{
      margin:0;
      font-size:16px;
      line-height:1.35;
      font-family:"Space Grotesk",sans-serif;
      color:#0f172a;
    }
    .price{
      color:#0b1f59;
      font-weight:700;
      font-size:15px;
    }
    .actions{
      margin-top:auto;
    }
    .buy-btn{
      display:inline-block;
      padding:10px 16px;
      border-radius:10px;
      background:linear-gradient(135deg,#1565ff,#0e49c9);
      color:#fff;
      text-decoration:none;
      font-weight:700;
      font-size:14px;
    }
    .buy-btn:hover{filter:brightness(1.06)}

    @media(max-width:768px){
      header{padding:10px 4%;flex-wrap:wrap;gap:8px}
      nav{width:100%;gap:12px;overflow-x:auto}
      main{padding:28px 5% 54px}
      .hero h1{font-size:28px}
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <img loading="lazy" src="LUCKYBASE logo letras.png" alt="Logo Lucky Base">
  </div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="planes.html">Planes</a>
    <a href="index.html#contacto">Contacto</a>
  </nav>
</header>

<main>
  <section class="hero">
    <h1>Productos en Vinted</h1>
    <p>Listado automático de las últimas publicaciones. Se actualiza desde GitHub Actions usando el fichero <code>productos.json</code>.</p>
  </section>

  <p id="vintedStatus" class="status">Cargando productos...</p>
  <section id="vintedGrid" class="grid" aria-live="polite"></section>
</main>

<script>
const grid=document.getElementById("vintedGrid")
const statusEl=document.getElementById("vintedStatus")

function toLocaleDate(iso){
  const d=new Date(iso||"")
  if(Number.isNaN(d.getTime())) return ""
  return d.toLocaleString("es-ES",{dateStyle:"medium",timeStyle:"short"})
}

function createCard(item){
  const card=document.createElement("article")
  card.className="card"

  const media=document.createElement("div")
  media.className="media"

  const img=document.createElement("img")
  img.loading="lazy"
  img.alt=item.title||"Producto Vinted"
  img.src=item.image||"https://via.placeholder.com/420x520?text=Vinted"
  media.appendChild(img)

  const badge=document.createElement("span")
  badge.className="badge"
  badge.textContent="Vinted"

  const title=document.createElement("h3")
  title.className="title"
  title.textContent=item.title||"Producto sin titulo"

  const price=document.createElement("div")
  price.className="price"
  price.textContent=item.price||"Precio no disponible"

  const actions=document.createElement("div")
  actions.className="actions"

  const buy=document.createElement("a")
  buy.className="buy-btn"
  buy.href=item.link||"#"
  buy.target="_blank"
  buy.rel="noopener noreferrer"
  buy.textContent="Comprar"
  actions.appendChild(buy)

  card.appendChild(media)
  card.appendChild(badge)
  card.appendChild(title)
  card.appendChild(price)
  card.appendChild(actions)
  return card
}

async function loadVintedProducts(){
  try{
    const resp=await fetch("productos.json",{cache:"no-store"})
    if(!resp.ok) throw new Error("HTTP_"+resp.status)
    const payload=await resp.json()
    const sourceInfo=(payload&&payload.sources&&payload.sources.vinted)||{}
    const allItems=Array.isArray(payload && payload.items)?payload.items:[]
    const items=allItems
      .filter((it)=>String(it && it.source||"").toLowerCase()==="vinted")
      .slice(0,10)

    grid.innerHTML=""

    if(!items.length){
      const customError=String(sourceInfo.error||"").trim()
      const configuredUrl=String(sourceInfo.profile_url||"").trim()
      if(customError){
        statusEl.textContent=customError
      }else if(!configuredUrl){
        statusEl.textContent="No hay URL de Vinted configurada todavía en la automatización."
      }else{
        statusEl.textContent="No hay productos de Vinted disponibles por ahora."
      }
      return
    }

    items.forEach((item)=>grid.appendChild(createCard(item||{})))
    const updated=toLocaleDate(payload && payload.generated_at)
    statusEl.textContent=updated
      ? `Mostrando ${items.length} productos. Última actualización: ${updated}.`
      : `Mostrando ${items.length} productos.`
  }catch(err){
    statusEl.textContent="No se pudieron cargar los productos en este momento."
  }
}

loadVintedProducts()
</script>

</body>
</html>
