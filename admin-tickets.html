<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Admin Tickets | LuckyBase</title>
<style>
:root{
  --bg-1:#050913;
  --bg-2:#0a1429;
  --panel:#0f1a31;
  --panel-strong:#111f39;
  --line:#25395e;
  --line-soft:#1d2d4b;
  --text:#e8efff;
  --muted:#99adcf;
  --primary:#2f7bff;
  --primary-hover:#4a8eff;
  --danger:#e64949;
  --ok:#0ca678;
  --warning:#e5a816;
  --radius-lg:16px;
  --radius-md:12px;
  --radius-sm:10px;
  --shadow-lg:0 20px 48px rgba(0, 7, 22, .45);
  --shadow-md:0 10px 28px rgba(0, 7, 22, .34);
}
*{box-sizing:border-box;font-family:"Plus Jakarta Sans","Avenir Next","Segoe UI",sans-serif;}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  background:
    radial-gradient(1150px 480px at 85% -5%, rgba(47,123,255,.18), transparent 62%),
    radial-gradient(950px 420px at 6% 0%, rgba(12,166,120,.13), transparent 56%),
    linear-gradient(180deg,var(--bg-1),var(--bg-2));
}
main{max-width:1200px;margin:0 auto;padding:32px 18px 64px;}
h1{margin:0;font-size:30px;letter-spacing:.2px;}
.headline-subtitle{
  margin-top:6px;
  color:var(--muted);
  font-size:14px;
}
.card{
  background:linear-gradient(180deg,var(--panel-strong),var(--panel));
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:18px;
  box-shadow:var(--shadow-lg);
  backdrop-filter:blur(6px);
}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
label{display:grid;gap:6px;font-size:12px;letter-spacing:.2px;text-transform:uppercase;color:var(--muted);font-weight:700;}
input,select,textarea,button{font:inherit;}
input,select,textarea{
  width:100%;
  background:#0a1326;
  border:1px solid var(--line);
  color:var(--text);
  border-radius:var(--radius-sm);
  padding:11px 12px;
  transition:border-color .2s ease, box-shadow .2s ease, background .2s ease;
}
input::placeholder,textarea::placeholder{color:#7086ad;}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(47,123,255,.2);
  background:#0b1730;
}
textarea{min-height:110px;resize:vertical;line-height:1.5;}
button{
  border:none;
  border-radius:999px;
  padding:10px 16px;
  font-weight:700;
  cursor:pointer;
  transition:transform .15s ease, opacity .2s ease, box-shadow .2s ease;
}
button:hover{transform:translateY(-1px);}
button:active{transform:translateY(0);}
button:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-hover));color:#fff;box-shadow:0 8px 20px rgba(47,123,255,.35);}
.btn-muted{background:#14213d;color:#d4e1ff;border:1px solid #2a4067;}
.btn-danger{background:linear-gradient(135deg,var(--danger),#d83f3f);color:#fff;box-shadow:0 8px 18px rgba(230,73,73,.25);}
.feedback{font-size:13px;color:var(--muted);min-height:18px;}
.feedback.error{color:#ffd2d2;}
.feedback.ok{color:#b5f4df;}
.hidden{display:none !important;}
.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:14px;
  flex-wrap:wrap;
  margin:14px 0 16px;
}
.toolbar-title strong{font-size:16px;letter-spacing:.2px;}
.toolbar .search-wrap{min-width:240px;max-width:360px;flex:1 1 320px;}
.toolbar .search-wrap input{width:100%;}
.ticket-list{display:grid;gap:14px;}
.ticket{
  border:1px solid var(--line);
  border-radius:var(--radius-md);
  padding:14px;
  background:linear-gradient(180deg,#0b162b,#0a1426);
  box-shadow:var(--shadow-md);
}
.ticket[data-status="abierto"]{border-left:4px solid #1fce7a;}
.ticket[data-status="en_proceso"]{border-left:4px solid var(--warning);}
.ticket[data-status="resuelto"]{border-left:4px solid #5c8dff;}
.ticket-top{
  display:flex;
  justify-content:space-between;
  gap:12px;
  align-items:flex-start;
  padding-bottom:10px;
  border-bottom:1px solid var(--line-soft);
}
.ticket-title{font-size:17px;font-weight:800;line-height:1.35;}
.ticket-meta{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.55;}
.ticket-main{display:grid;gap:10px;margin-top:12px;}
.panel-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:8px;
}
.panel-cell{
  background:#091326;
  border:1px solid var(--line-soft);
  border-radius:10px;
  padding:8px 10px;
}
.panel-label{
  display:block;
  font-size:10px;
  letter-spacing:.35px;
  text-transform:uppercase;
  color:#8fa7ce;
  margin-bottom:4px;
}
.panel-value{
  display:block;
  font-size:13px;
  color:#e3edff;
  line-height:1.35;
  font-weight:700;
}
.ticket-preview{
  background:#091326;
  border:1px solid var(--line-soft);
  border-radius:10px;
  padding:9px 10px;
}
.ticket-preview strong{
  display:block;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.3px;
  color:#8fa7ce;
  margin-bottom:4px;
}
.ticket-preview p{
  margin:0;
  font-size:13px;
  color:#d6e5ff;
  line-height:1.45;
  white-space:pre-wrap;
}
.tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{font-size:11px;font-weight:800;border-radius:999px;padding:5px 9px;text-transform:uppercase;letter-spacing:.25px;}
.p-baja{background:#0a3e56;color:#b3ebff;}
.p-media{background:#3a216b;color:#e4d8ff;}
.p-alta{background:#6d1d1d;color:#ffd0d0;}
.s-abierto{background:#11452a;color:#b9f5d3;}
.s-en_proceso{background:#684608;color:#ffe8ab;}
.s-resuelto{background:#203e80;color:#cfe1ff;}
.ticket-detail{
  margin-top:12px;
  border:1px solid var(--line-soft);
  border-radius:10px;
  background:#091326;
  overflow:hidden;
}
.ticket-detail > summary{
  list-style:none;
  cursor:pointer;
  padding:10px 12px;
  user-select:none;
  color:#d5e5ff;
  font-size:13px;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#0a1730;
}
.ticket-detail > summary::-webkit-details-marker{display:none;}
.ticket-detail > summary::after{
  content:"+";
  color:#9cb4da;
  font-size:18px;
  line-height:1;
}
.ticket-detail[open] > summary::after{
  content:"-";
}
.ticket-detail-body{padding:10px;}
.ticket-chat{
  margin-top:0;
  display:grid;
  gap:9px;
  background:#091326;
  border:1px solid var(--line-soft);
  border-radius:10px;
  padding:10px;
}
.msg{
  border:1px solid #2d456f;
  border-radius:10px;
  padding:9px 10px;
  background:#0f1c35;
}
.msg.admin{background:#0f2d2e;border-color:#1a6963;}
.msg.client{background:#102746;border-color:#1e4d9d;}
.msg-head{display:flex;justify-content:space-between;gap:8px;font-size:11px;color:#9eb3d8;margin-bottom:4px;}
.msg-body{white-space:pre-wrap;line-height:1.48;font-size:13px;color:#dbe7ff;}
.reply-grid{
  display:grid;
  gap:8px;
  margin-top:10px;
  background:#091324;
  border:1px solid var(--line-soft);
  border-radius:10px;
  padding:10px;
}
.empty-state{
  margin:0;
  border:1px dashed var(--line);
  border-radius:10px;
  background:#0b172d;
  padding:14px;
  color:var(--muted);
}
small{color:var(--muted);}
@media (max-width:760px){
  h1{font-size:26px;}
  .toolbar{align-items:stretch;}
  .reply-grid .row{flex-direction:column;align-items:stretch;}
}
</style>
</head>
<body>
<main>
  <h1>LuckyBase Admin · Tickets</h1>
  <p class="headline-subtitle">Gestiona conversaciones, estado y seguimiento de soporte desde un único panel.</p>

  <section id="loginCard" class="card">
    <h2 style="margin:0 0 10px;font-size:18px;">Acceso administrador</h2>
    <form id="loginForm" class="reply-grid" autocomplete="off">
      <label>Usuario
        <input id="adminUser" type="text" minlength="3" maxlength="80" required>
      </label>
      <label>Contraseña
        <input id="adminPass" type="password" minlength="12" maxlength="160" required>
      </label>
      <div class="row">
        <button class="btn-primary" type="submit">Entrar</button>
      </div>
      <div id="loginFeedback" class="feedback"></div>
      <small>Recomendado: URL no pública + contraseña larga + rotación periódica.</small>
    </form>
  </section>

  <section id="adminCard" class="hidden">
    <div class="card">
      <div class="toolbar">
        <div class="toolbar-title">
          <strong id="adminUserLabel">Admin</strong>
          <div class="feedback" id="sessionInfo"></div>
        </div>
        <div class="row">
          <label class="search-wrap">Buscar
            <input id="searchFilter" type="search" placeholder="Ticket, usuario o correo" autocomplete="off">
          </label>
          <label>Estado
            <select id="statusFilter">
              <option value="">Todos</option>
              <option value="abierto">Abierto</option>
              <option value="en_proceso">En proceso</option>
              <option value="resuelto">Resuelto</option>
            </select>
          </label>
          <button class="btn-muted" id="refreshBtn" type="button">Actualizar</button>
          <button class="btn-danger" id="logoutBtn" type="button">Salir</button>
        </div>
      </div>
      <div id="ticketsFeedback" class="feedback"></div>
      <div id="ticketsList" class="ticket-list"><p class="feedback">Cargando tickets...</p></div>
    </div>
  </section>
</main>

<script>
const URL_API = "https://script.google.com/macros/s/AKfycbxZeMApnIjxoF4aAPxNhcLbUb09JluFb4E7jP67bINuODTv08q9xDFtzC5updMnV_Gi/exec"
const SESSION_KEY = "luckybase_admin_session_v1"
const API_TIMEOUT_MS = 95000
const API_TIMEOUT_RETRIES = 0
let ticketsCache = []

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/\"/g, "&quot;")
    .replace(/'/g, "&#39;")
}

function formatDateTime(value){
  const ts = Date.parse(String(value || ""))
  if(!Number.isFinite(ts)) return String(value || "-")
  return new Intl.DateTimeFormat("es-ES", { dateStyle:"medium", timeStyle:"short" }).format(new Date(ts))
}

function readSession(){
  const raw = sessionStorage.getItem(SESSION_KEY)
  if(!raw) return null
  try{ return JSON.parse(raw) }catch(_){ return null }
}

function writeSession(data){
  sessionStorage.setItem(SESSION_KEY, JSON.stringify(data || {}))
}

function clearSession(){
  sessionStorage.removeItem(SESSION_KEY)
}

async function apiPostRequest(payload, timeoutMs=API_TIMEOUT_MS){
  const maxAttempts = 1 + API_TIMEOUT_RETRIES
  let lastError = null

  for(let attempt = 1; attempt <= maxAttempts; attempt++){
    const controller = new AbortController()
    const timeoutId = setTimeout(() => controller.abort(), timeoutMs)
    try{
      const response = await fetch(URL_API, {
        method: "POST",
        mode: "cors",
        cache: "no-store",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload || {}),
        signal: controller.signal
      })
      if(!response.ok){
        throw new Error("HTTP_" + response.status)
      }
      const text = await response.text()
      try{
        return JSON.parse(text)
      }catch(_){
        throw new Error("NON_JSON_RESPONSE")
      }
    }catch(error){
      if(error && error.name === "AbortError"){
        lastError = new Error("TIMEOUT")
      }else{
        lastError = error
      }
      if(!(lastError && lastError.message === "TIMEOUT") || attempt >= maxAttempts){
        throw lastError
      }
    }finally{
      clearTimeout(timeoutId)
    }
  }

  throw (lastError || new Error("REQUEST_FAILED"))
}

function setFeedback(id, message, type=""){
  const el = document.getElementById(id)
  if(!el) return
  el.textContent = message || ""
  el.className = "feedback" + (type ? " " + type : "")
}

function showAdminView(show){
  document.getElementById("loginCard").classList.toggle("hidden", show)
  document.getElementById("adminCard").classList.toggle("hidden", !show)
}

function normalizePriority(raw){
  const p = String(raw || "").toLowerCase()
  return p === "alta" ? "alta" : (p === "baja" ? "baja" : "media")
}

function normalizeStatus(raw){
  const s = String(raw || "").toLowerCase()
  if(s === "resuelto") return "resuelto"
  if(s === "en_proceso") return "en_proceso"
  return "abierto"
}

function normalizeSearchValue(value){
  return String(value || "")
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim()
}

function filterTicketsBySearch(tickets){
  const searchEl = document.getElementById("searchFilter")
  const query = normalizeSearchValue(searchEl ? searchEl.value : "")
  const list = Array.isArray(tickets) ? tickets : []
  if(!query){
    return list
  }

  return list.filter((ticket) => {
    const haystack = normalizeSearchValue([
      ticket.ticketId,
      ticket.asunto,
      ticket.usuario,
      ticket.clientEmail,
      ticket.clientName,
      ticket.clientPlan,
      ticket.clientPlanType
    ].join(" "))
    return haystack.includes(query)
  })
}

function truncateText(value, maxLen){
  const text = String(value || "").replace(/\s+/g, " ").trim()
  if(!maxLen || text.length <= maxLen){
    return text
  }
  return text.slice(0, Math.max(0, maxLen - 1)).trimEnd() + "…"
}

function renderMessages(messages){
  const list = Array.isArray(messages) ? messages : []
  if(!list.length){
    return '<p class="feedback">Sin mensajes todavía.</p>'
  }
  return list.map((msg) => {
    const roleRaw = String(msg.senderRole || "client").toLowerCase()
    const role = roleRaw === "admin" ? "admin" : "client"
    const roleLabel = role === "admin" ? "Admin LuckyBase" : "Cliente"
    return `\
      <div class="msg ${escapeHtml(role)}">
        <div class="msg-head">
          <strong>${escapeHtml(roleLabel)}</strong>
          <span>${escapeHtml(formatDateTime(msg.createdAt))}</span>
        </div>
        <div class="msg-body">${escapeHtml(msg.message || "")}</div>
      </div>
    `
  }).join("")
}

function ticketCardHtml(ticket){
  const priority = normalizePriority(ticket.prioridad)
  const status = normalizeStatus(ticket.estado)
  const statusText = status.replace("_"," ")
  const clientName = String(ticket.clientName || "").trim() || "-"
  const clientEmail = String(ticket.clientEmail || "").trim() || "-"
  const clientPlan = String(ticket.clientPlan || "").trim() || "-"
  const clientPlanType = String(ticket.clientPlanType || "").trim() || "-"
  const openingMessage = truncateText(ticket.mensaje || "", 260) || "-"
  const messages = Array.isArray(ticket.messages) ? ticket.messages : []
  const latestMessage = messages.length
    ? truncateText(messages[messages.length - 1].message || "", 260)
    : openingMessage
  const messagesHtml = renderMessages(ticket.messages || [])
  const selectedOpen = status === "abierto" ? " selected" : ""
  const selectedInProgress = status === "en_proceso" ? " selected" : ""
  const selectedResolved = status === "resuelto" ? " selected" : ""
  return `
    <article class="ticket" data-ticket-id="${escapeHtml(ticket.ticketId || "")}" data-status="${escapeHtml(status)}" data-priority="${escapeHtml(priority)}">
      <div class="ticket-top">
        <div>
          <div class="ticket-title">${escapeHtml(ticket.asunto || "-")}</div>
          <div class="ticket-meta">
            ${escapeHtml(ticket.ticketId || "-")} · ${escapeHtml(ticket.usuario || "-")} · ${escapeHtml(clientEmail)}<br>
            Creado: ${escapeHtml(formatDateTime(ticket.createdAt))} · Actualizado: ${escapeHtml(formatDateTime(ticket.updatedAt))}
          </div>
        </div>
        <div class="tags">
          <span class="tag p-${escapeHtml(priority)}">${escapeHtml(priority)}</span>
          <span class="tag s-${escapeHtml(status)}">${escapeHtml(statusText)}</span>
        </div>
      </div>
      <div class="ticket-main">
        <div class="panel-grid">
          <div class="panel-cell"><span class="panel-label">Nombre cliente</span><span class="panel-value">${escapeHtml(clientName)}</span></div>
          <div class="panel-cell"><span class="panel-label">Usuario</span><span class="panel-value">${escapeHtml(ticket.usuario || "-")}</span></div>
          <div class="panel-cell"><span class="panel-label">Correo</span><span class="panel-value">${escapeHtml(clientEmail)}</span></div>
          <div class="panel-cell"><span class="panel-label">Plan</span><span class="panel-value">${escapeHtml(clientPlan)}</span></div>
          <div class="panel-cell"><span class="panel-label">Tipo de plan</span><span class="panel-value">${escapeHtml(clientPlanType)}</span></div>
          <div class="panel-cell"><span class="panel-label">Último estado</span><span class="panel-value">${escapeHtml(statusText)}</span></div>
        </div>
        <div class="ticket-preview">
          <strong>Mensaje principal</strong>
          <p>${escapeHtml(openingMessage)}</p>
        </div>
        <div class="ticket-preview">
          <strong>Última actualización del chat</strong>
          <p>${escapeHtml(latestMessage || "-")}</p>
        </div>
      </div>
      <details class="ticket-detail">
        <summary>Ver chat completo y responder</summary>
        <div class="ticket-detail-body">
          <div class="ticket-chat">${messagesHtml}</div>
          <div class="reply-grid">
            <label>Responder al cliente
              <textarea class="reply-text" maxlength="4000" placeholder="Escribe aquí la respuesta..."></textarea>
            </label>
            <div class="row">
              <label>Nuevo estado
                <select class="reply-status">
                  <option value="en_proceso"${selectedInProgress}>En proceso</option>
                  <option value="resuelto"${selectedResolved}>Resuelto</option>
                  <option value="abierto"${selectedOpen}>Abierto</option>
                </select>
              </label>
              <button class="btn-primary reply-send" type="button">Enviar respuesta</button>
            </div>
          </div>
        </div>
      </details>
      <div class="ticket-preview">
        <strong>Fuente del ticket</strong>
        <p>${escapeHtml(ticket.source || "panel_cliente")}</p>
      </div>
    </article>
  `
}

function renderTickets(tickets){
  const list = document.getElementById("ticketsList")
  if(!Array.isArray(tickets) || !tickets.length){
    list.innerHTML = '<p class="empty-state">No hay tickets con ese filtro.</p>'
    return
  }
  list.innerHTML = tickets.map(ticketCardHtml).join("")

  list.querySelectorAll(".reply-send").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const article = btn.closest(".ticket")
      if(!article) return
      const ticketId = article.getAttribute("data-ticket-id") || ""
      const textEl = article.querySelector(".reply-text")
      const statusEl = article.querySelector(".reply-status")
      const response = textEl ? String(textEl.value || "").trim() : ""
      const estado = statusEl ? String(statusEl.value || "en_proceso") : "en_proceso"
      if(response.length < 2){
        setFeedback("ticketsFeedback", "La respuesta debe tener al menos 2 caracteres.", "error")
        return
      }
      const session = readSession()
      if(!session || !session.adminToken){
        setFeedback("ticketsFeedback", "Sesión admin no válida.", "error")
        showAdminView(false)
        return
      }

      btn.disabled = true
      setFeedback("ticketsFeedback", "Enviando respuesta...")
      try{
        const result = await apiPostRequest({
          action: "admin_reply_ticket",
          adminToken: session.adminToken,
          ticketId,
          response,
          estado
        }, API_TIMEOUT_MS)

        if(!result || result.success !== true){
          setFeedback("ticketsFeedback", (result && result.message) ? result.message : "No se pudo responder el ticket.", "error")
          return
        }

        setFeedback("ticketsFeedback", "Respuesta enviada correctamente.", "ok")
        await loadTickets()
  }catch(error){
    setFeedback("ticketsFeedback", "No se pudo responder el ticket (" + String(error && error.message || "ERROR") + ").", "error")
  }finally{
    btn.disabled = false
  }
    })
  })
}

function applyTicketFilters(){
  const filteredTickets = filterTicketsBySearch(ticketsCache)
  renderTickets(filteredTickets)
}

async function loadTickets(){
  const session = readSession()
  if(!session || !session.adminToken){
    showAdminView(false)
    return
  }
  const estado = String(document.getElementById("statusFilter").value || "")
  setFeedback("ticketsFeedback", "Cargando tickets... (puede tardar hasta 1 min)")
  try{
    const result = await apiPostRequest({
      action: "admin_list_tickets",
      adminToken: session.adminToken,
      estado,
      limit: 200
    }, API_TIMEOUT_MS)

    if(!result || result.success !== true){
      setFeedback("ticketsFeedback", (result && result.message) ? result.message : "No se pudieron cargar tickets.", "error")
      return
    }

    ticketsCache = Array.isArray(result.tickets) ? result.tickets : []
    applyTicketFilters()
    setFeedback("ticketsFeedback", "")
  }catch(error){
    setFeedback("ticketsFeedback", "Error cargando tickets (" + String(error && error.message || "ERROR") + ").", "error")
  }
}

async function validateAdminSession(){
  const session = readSession()
  if(!session || !session.adminToken){
    showAdminView(false)
    return false
  }

  try{
    const result = await apiPostRequest({
      action: "admin_validate",
      adminToken: session.adminToken
    }, API_TIMEOUT_MS)

    if(!result || result.success !== true || result.valid !== true){
      clearSession()
      showAdminView(false)
      return false
    }

    writeSession({
      adminToken: session.adminToken,
      adminUser: result.adminUser,
      adminExpiresAt: result.adminExpiresAt
    })

    document.getElementById("adminUserLabel").textContent = "Admin: " + (result.adminUser || "-")
    document.getElementById("sessionInfo").textContent = "Sesión válida hasta: " + formatDateTime(result.adminExpiresAt)
    showAdminView(true)
    return true
  }catch(error){
    clearSession()
    showAdminView(false)
    setFeedback("loginFeedback", "Error validando sesión (" + String(error && error.message || "ERROR") + ").", "error")
    return false
  }
}

async function handleLogin(event){
  event.preventDefault()
  const username = String(document.getElementById("adminUser").value || "").trim()
  const password = String(document.getElementById("adminPass").value || "")
  if(!username || !password){
    setFeedback("loginFeedback", "Completa usuario y contraseña.", "error")
    return
  }

  setFeedback("loginFeedback", "Validando... (primera llamada puede tardar)")
  try{
    const result = await apiPostRequest({
      action: "admin_login",
      username,
      password
    }, API_TIMEOUT_MS)

    if(!result || result.success !== true || result.valid !== true){
      setFeedback("loginFeedback", (result && result.message) ? result.message : "No se pudo iniciar sesión.", "error")
      return
    }

    writeSession({
      adminToken: result.adminToken,
      adminUser: result.adminUser,
      adminExpiresAt: result.adminExpiresAt
    })
    document.getElementById("adminPass").value = ""
    setFeedback("loginFeedback", "Acceso correcto.", "ok")
    const ok = await validateAdminSession()
    if(ok){
      await loadTickets()
    }
  }catch(error){
    setFeedback("loginFeedback", "No se pudo iniciar sesión (" + String(error && error.message || "ERROR") + ").", "error")
  }
}

function handleLogout(){
  clearSession()
  ticketsCache = []
  const searchEl = document.getElementById("searchFilter")
  if(searchEl){
    searchEl.value = ""
  }
  showAdminView(false)
  setFeedback("ticketsFeedback", "")
}

document.getElementById("loginForm").addEventListener("submit", handleLogin)
document.getElementById("refreshBtn").addEventListener("click", loadTickets)
document.getElementById("statusFilter").addEventListener("change", loadTickets)
document.getElementById("searchFilter").addEventListener("input", applyTicketFilters)
document.getElementById("logoutBtn").addEventListener("click", handleLogout)

validateAdminSession().then((ok) => {
  if(ok){
    loadTickets()
  }
})
</script>
